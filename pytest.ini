[pytest]
testpaths =
    tests
    test
python_files = test_*.py
markers =
    unit: pure logic and narrow module contract tests
    integration: end-to-end and subsystem interaction tests
    property: invariant and determinism tests
    slow: expensive tests that should be excluded from quick runs
norecursedirs =
    .git
    .idea
    .venv_torch
    __pycache__
    sampling_zoo
